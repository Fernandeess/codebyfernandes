version: '3.8'

services:
  blog-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blog-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xmx512m -Xms256m"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/posts"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - blog-network

  blog-web:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: blog-web
    ports:
      - "80:80"
    depends_on:
      blog-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - blog-network

networks:
  blog-network:
    driver: bridge
