<div id="experiences" class="default_container">
  <div class="header-container">
    <img
      src="https://res.cloudinary.com/dqvkg85dl/image/upload/v1749956270/briefcase_l8ajhr.svg"
      alt="Tecnologias"
      class="header-image"
    />
    <h1>Experiências</h1>
  </div>
  <div *ngFor="let event of events" class="experience-card">
    <div class="experience-header">
      <img
        [src]="event.logo"
        alt="{{ event.empresa }} logo"
        class="company-logo"
      />
      <div class="experience-title">
        <h5>{{ event.cargo }}</h5>
        <p class="empresa">{{ event.empresa }}</p>
      </div>
    </div>

    <div class="experience-details">
      <p class="periodo"><strong>Período:</strong> {{ event.periodo }}</p>
      <p class="descricao-title"><strong>Descrição</strong></p>
      <ul class="descricao-list">
        <li *ngFor="let item of event.descricao">
          <p>{{ item }}</p>
        </li>
      </ul>
    </div>
  </div>
</div>
