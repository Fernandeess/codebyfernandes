spring:
  application:
    name: blog-api

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
    initialization-mode: always

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: mySecretKeyForBlogApiThatIsAtLeast32CharactersLongAndSecure
  expiration: 86400000

logging:
  level:
    root: INFO
    com.codebyfernandes: DEBUG
